<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record Validator — Maddox Cox</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <style>
        .calc-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 20px;
        }

        .calc-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .calc-header h1 {
            margin-bottom: 0.25rem;
        }

        /* Terminal Window */
        .terminal {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid #3a3a4a;
        }

        .terminal-titlebar {
            background-color: #2b2b3b;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .terminal-dots {
            display: flex;
            gap: 6px;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .terminal-dot.red { background-color: #ff5f57; }
        .terminal-dot.yellow { background-color: #febc2e; }
        .terminal-dot.green { background-color: #28c840; }

        .terminal-title {
            flex: 1;
            text-align: center;
            color: #8a8a9a;
            font-size: 0.8rem;
            font-family: 'Fira Code', 'Consolas', monospace;
        }

        .terminal-body {
            background-color: #1e1e2e;
            padding: 1.25rem;
            min-height: 280px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .terminal-output {
            color: #cdd6f4;
        }

        .terminal-line {
            margin-bottom: 0.25rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .terminal-line .prompt {
            color: #a6e3a1;
        }

        .terminal-line .cmd {
            color: #89b4fa;
        }

        .terminal-line.error {
            color: #f38ba8;
        }

        .terminal-line.success {
            color: #a6e3a1;
        }

        .terminal-line.info {
            color: #cdd6f4;
        }

        .terminal-line.dim {
            color: #6c7086;
        }

        .terminal-input-row {
            display: flex;
            align-items: center;
            gap: 0;
            margin-top: 0.5rem;
        }

        .terminal-input-row .prompt-label {
            color: #a6e3a1;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .terminal-input-row input {
            flex: 1;
            background: none;
            border: none;
            color: #cdd6f4;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            outline: none;
            caret-color: #a6e3a1;
            padding: 0;
            margin-left: 0;
        }

        .terminal-input-row input::placeholder {
            color: #585b70;
        }

        .terminal-actions {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background-color: #181825;
            border-top: 1px solid #313244;
        }

        .terminal-btn {
            padding: 0.4rem 1rem;
            border: 1px solid #45475a;
            border-radius: 5px;
            background-color: #313244;
            color: #cdd6f4;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .terminal-btn:hover {
            background-color: #45475a;
            border-color: #585b70;
        }

        .terminal-btn.run {
            background-color: #a6e3a1;
            color: #1e1e2e;
            border-color: #a6e3a1;
            font-weight: 600;
        }

        .terminal-btn.run:hover {
            background-color: #94e2d5;
            border-color: #94e2d5;
        }

        .calc-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .calc-actions .btn {
            flex: 1;
        }

        /* Loading animation */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="../../index.html" class="logo">Maddox<span>Cox</span></a>
            <ul class="nav-links">
                <li><a href="../../index.html#projects">Projects</a></li>
                <li><a href="https://github.com/maddoxcox" target="_blank">GitHub</a></li>
            </ul>
            <button class="mobile-menu">☰</button>
        </nav>
    </header>

    <main class="calc-container">
        <div class="calc-header">
            <div class="breadcrumb">
                <a href="../../index.html">Home</a> / Student Record Validator
            </div>
            <h1>Student Record Validator</h1>
            <p>Add student records, then validate them all for errors.</p>
        </div>

        <div class="terminal">
            <div class="terminal-titlebar">
                <div class="terminal-dots">
                    <span class="terminal-dot red"></span>
                    <span class="terminal-dot yellow"></span>
                    <span class="terminal-dot green"></span>
                </div>
                <span class="terminal-title">student_validator.py — Python</span>
                <div style="width: 48px;"></div>
            </div>
            <div class="terminal-body">
                <div class="terminal-output" id="terminal-output">
                    <div class="terminal-line dim">$ python student_validator.py</div>
                </div>
                <div class="terminal-input-row">
                    <span class="prompt-label">$ Enter record (name, grade, email):&nbsp;</span>
                    <input type="text" id="record-input" placeholder="Jane Smith, 95, jane@school.edu" autofocus>
                </div>
            </div>
            <div class="terminal-actions">
                <button class="terminal-btn run" id="add-btn">Add</button>
                <button class="terminal-btn run" id="validate-btn">Validate</button>
                <button class="terminal-btn" id="clear-btn">Clear</button>
            </div>
        </div>

        <div class="calc-actions">
            <a href="https://github.com/maddoxcox/ai-club-learning/blob/main/month-1-foundations/day-02-record-validator/student_validator.py" target="_blank" class="btn btn-secondary">View Python Source</a>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Maddox Cox — CS Student</p>
        </div>
    </footer>

    <script>
        const records = [];
        const input = document.getElementById("record-input");
        const addBtn = document.getElementById("add-btn");
        const validateBtn = document.getElementById("validate-btn");
        const clearBtn = document.getElementById("clear-btn");
        const output = document.getElementById("terminal-output");

        function addLine(text, className) {
            const line = document.createElement("div");
            line.className = "terminal-line" + (className ? " " + className : "");
            line.textContent = text;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function validateName(name) {
            if (!name || name.trim() === "") return "Name is empty";
            if (!/^[a-zA-Z\s]+$/.test(name.trim())) return "Name must contain only letters and spaces";
            return null;
        }

        function validateGrade(grade) {
            if (grade === "" || grade === null || grade === undefined) return "Grade is empty";
            const num = Number(grade);
            if (isNaN(num)) return "Grade must be a number";
            if (num < 0 || num > 100) return "Grade must be between 0 and 100";
            return null;
        }

        function validateEmail(email) {
            if (!email || email.trim() === "") return "Email is empty";
            const trimmed = email.trim();
            if (!trimmed.includes("@")) return "Email must contain @";
            if (!trimmed.includes(".")) return "Email must contain a dot (.)";
            return null;
        }

        function validateRecord(record) {
            const errors = [];
            const nameErr = validateName(record.name);
            if (nameErr) errors.push(nameErr);
            const gradeErr = validateGrade(record.grade);
            if (gradeErr) errors.push(gradeErr);
            const emailErr = validateEmail(record.email);
            if (emailErr) errors.push(emailErr);
            return errors;
        }

        function addRecord() {
            const raw = input.value.trim();
            if (!raw) return;

            const parts = raw.split(",");
            const name = (parts[0] || "").trim();
            const grade = (parts[1] || "").trim();
            const email = (parts[2] || "").trim();

            records.push({ name, grade, email });
            input.value = "";
            input.focus();

            addLine("$ Enter record: " + raw, "dim");
            addLine(`Added record #${records.length}: ${name || "(no name)"}, ${grade || "(empty)"}, ${email || "(no email)"}`, "success");
            addLine("", "");
        }

        function validateBatch() {
            if (records.length === 0) {
                addLine("Error: No records to validate.", "error");
                addLine("", "");
                return;
            }

            addLine("$ validate_all()", "dim");
            addLine(`Validating ${records.length} record${records.length > 1 ? "s" : ""}...`, "info");
            addLine("", "");

            let validCount = 0;
            let invalidCount = 0;

            records.forEach((rec) => {
                const errors = validateRecord(rec);
                const label = rec.name || "(no name)";
                if (errors.length === 0) {
                    validCount++;
                    addLine(`  [PASS] ${label}`, "success");
                } else {
                    invalidCount++;
                    addLine(`  [FAIL] ${label}`, "error");
                    errors.forEach(err => {
                        addLine(`         - ${err}`, "error");
                    });
                }
            });

            addLine("", "");
            addLine("--- Results ---", "info");
            addLine(`Total:   ${records.length}`, "info");
            addLine(`Valid:   ${validCount}`, "success");
            addLine(`Invalid: ${invalidCount}`, invalidCount > 0 ? "error" : "info");

            if (invalidCount === 0) {
                addLine("All records are valid!", "success");
            }

            addLine("", "");
        }

        function clearTerminal() {
            records.length = 0;
            output.innerHTML = "";
            addLine("$ python student_validator.py", "dim");
        }

        addBtn.addEventListener("click", addRecord);
        validateBtn.addEventListener("click", validateBatch);
        clearBtn.addEventListener("click", clearTerminal);
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") addRecord();
        });
    </script>
    <script src="../../js/main.js"></script>
</body>
</html>
