<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator — Maddox Cox</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <style>
        .calc-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 20px;
        }

        .calc-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .calc-header h1 {
            margin-bottom: 0.25rem;
        }

        /* Terminal Window */
        .terminal {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid #3a3a4a;
        }

        .terminal-titlebar {
            background-color: #2b2b3b;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .terminal-dots {
            display: flex;
            gap: 6px;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .terminal-dot.red { background-color: #ff5f57; }
        .terminal-dot.yellow { background-color: #febc2e; }
        .terminal-dot.green { background-color: #28c840; }

        .terminal-title {
            flex: 1;
            text-align: center;
            color: #8a8a9a;
            font-size: 0.8rem;
            font-family: 'Fira Code', 'Consolas', monospace;
        }

        .terminal-body {
            background-color: #1e1e2e;
            padding: 1.25rem;
            min-height: 280px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .terminal-output {
            color: #cdd6f4;
        }

        .terminal-line {
            margin-bottom: 0.25rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .terminal-line .prompt {
            color: #a6e3a1;
        }

        .terminal-line .cmd {
            color: #89b4fa;
        }

        .terminal-line.error {
            color: #f38ba8;
        }

        .terminal-line.success {
            color: #a6e3a1;
        }

        .terminal-line.info {
            color: #cdd6f4;
        }

        .terminal-line.dim {
            color: #6c7086;
        }

        .terminal-input-row {
            display: flex;
            align-items: center;
            gap: 0;
            margin-top: 0.5rem;
        }

        .terminal-input-row .prompt-label {
            color: #a6e3a1;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .terminal-input-row input {
            flex: 1;
            background: none;
            border: none;
            color: #cdd6f4;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            outline: none;
            caret-color: #a6e3a1;
            padding: 0;
            margin-left: 0;
        }

        .terminal-input-row input::placeholder {
            color: #585b70;
        }

        .terminal-actions {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background-color: #181825;
            border-top: 1px solid #313244;
        }

        .terminal-btn {
            padding: 0.4rem 1rem;
            border: 1px solid #45475a;
            border-radius: 5px;
            background-color: #313244;
            color: #cdd6f4;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .terminal-btn:hover {
            background-color: #45475a;
            border-color: #585b70;
        }

        .terminal-btn.run {
            background-color: #a6e3a1;
            color: #1e1e2e;
            border-color: #a6e3a1;
            font-weight: 600;
        }

        .terminal-btn.run:hover {
            background-color: #94e2d5;
            border-color: #94e2d5;
        }

        .calc-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .calc-actions .btn {
            flex: 1;
        }

        /* Loading animation */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="../../index.html" class="logo">Maddox<span>Cox</span></a>
            <ul class="nav-links">
                <li><a href="../../index.html#projects">Projects</a></li>
                <li><a href="https://github.com/maddoxcox" target="_blank">GitHub</a></li>
            </ul>
            <button class="mobile-menu">☰</button>
        </nav>
    </header>

    <main class="calc-container">
        <div class="calc-header">
            <div class="breadcrumb">
                <a href="../../index.html">Home</a> / GPA Calculator
            </div>
            <h1>GPA Calculator</h1>
            <p>Enter letter grades (A+ through F) or percentages (0-100).</p>
        </div>

        <div class="terminal">
            <div class="terminal-titlebar">
                <div class="terminal-dots">
                    <span class="terminal-dot red"></span>
                    <span class="terminal-dot yellow"></span>
                    <span class="terminal-dot green"></span>
                </div>
                <span class="terminal-title">grade_calculator.py — Python</span>
                <div style="width: 48px;"></div>
            </div>
            <div class="terminal-body">
                <div class="terminal-output" id="terminal-output">
                    <div class="terminal-line dim">$ python grade_calculator.py</div>
                </div>
                <div class="terminal-input-row">
                    <span class="prompt-label">$ Enter a grade:&nbsp;</span>
                    <input type="text" id="grade-input" placeholder="A+, B-, 87, 92.5" autofocus>
                </div>
            </div>
            <div class="terminal-actions">
                <button class="terminal-btn run" id="add-btn">Add</button>
                <button class="terminal-btn" id="clear-btn">Clear</button>
            </div>
        </div>

        <div class="calc-actions">
            <a href="https://github.com/maddoxcox/ai-club-learning/blob/main/month-1-foundations/day-01-error-handler/grade_calculator.py" target="_blank" class="btn btn-secondary">View Python Source</a>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Maddox Cox — CS Student</p>
        </div>
    </footer>

    <script>
        const GRADE_POINTS = {
            "A+": 4.0, "A": 4.0, "A-": 3.7,
            "B+": 3.4, "B": 3.0, "B-": 2.7,
            "C+": 2.4, "C": 2.0, "C-": 1.7,
            "D+": 1.4, "D": 1.0, "D-": 0.7,
            "F": 0.0,
        };

        function getGrade(percent) {
            if (percent >= 94.0) return "A";
            if (percent >= 90.0) return "A-";
            if (percent >= 87.0) return "B+";
            if (percent >= 83.0) return "B";
            if (percent >= 80.0) return "B-";
            if (percent >= 77.0) return "C+";
            if (percent >= 73.0) return "C";
            if (percent >= 70.0) return "C-";
            if (percent >= 67.0) return "D+";
            if (percent >= 63.0) return "D";
            if (percent >= 60.0) return "D-";
            return "F";
        }

        const grades = [];
        const input = document.getElementById("grade-input");
        const addBtn = document.getElementById("add-btn");
        const clearBtn = document.getElementById("clear-btn");
        const output = document.getElementById("terminal-output");

        function addLine(text, className) {
            const line = document.createElement("div");
            line.className = "terminal-line" + (className ? " " + className : "");
            line.textContent = text;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function addGrade() {
            const raw = input.value.trim();
            if (!raw) return;

            let letter, source;
            const num = parseFloat(raw);

            if (!isNaN(num) && raw.match(/^-?\d+\.?\d*$/)) {
                if (num < 0 || num > 100) {
                    addLine("$ Enter a grade: " + raw, "dim");
                    addLine("Error: Percentage must be between 0 and 100.", "error");
                    addLine("", "");
                    input.value = "";
                    return;
                }
                letter = getGrade(num);
                source = `${num}%`;
            } else {
                letter = raw.toUpperCase();
                if (!(letter in GRADE_POINTS)) {
                    addLine("$ Enter a grade: " + raw, "dim");
                    addLine('Error: Invalid grade "' + raw + '". Use A+ through F or 0-100.', "error");
                    addLine("", "");
                    input.value = "";
                    return;
                }
                source = null;
            }

            grades.push({ letter, source });
            input.value = "";
            input.focus();

            const sourceLabel = source ? ` (from ${source})` : "";
            addLine("$ Enter a grade: " + raw, "dim");
            addLine(`Added: ${letter} (${GRADE_POINTS[letter]} pts)${sourceLabel}`, "success");

            if (letter === "F") {
                addLine("ur cooked", "error");
            }

            const total = grades.reduce((sum, g) => sum + GRADE_POINTS[g.letter], 0);
            const gpa = total / grades.length;
            addLine(`GPA so far: ${gpa.toFixed(2)} (${grades.length} grade${grades.length > 1 ? "s" : ""})`, "info");
            addLine("", "");
        }

        function clearTerminal() {
            grades.length = 0;
            output.innerHTML = "";
            addLine("$ python grade_calculator.py", "dim");
        }

        addBtn.addEventListener("click", addGrade);
        clearBtn.addEventListener("click", clearTerminal);
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") addGrade();
        });
    </script>
    <script src="../../js/main.js"></script>
</body>
</html>
